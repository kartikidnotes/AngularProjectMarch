<div class="container my-5">

  <!-- ===== Page Title Section ===== -->
  <div class="text-center mb-5">
    <h1 class="fw-bold display-5 mb-3">Our Premium Services</h1>
    <p class="text-muted fs-5">
      Choose the best professional service for your home needs
    </p>
  </div>

  <!-- ===== Services Grid Section ===== -->
  <div class="row justify-content-center g-4">

    <div *ngFor="let service of services" class="col-md-6 col-lg-4">

      <div class="card h-100 shadow-lg border-0 rounded-4 p-3">

        <!-- Service Image -->
        <img [src]="service.image" class="card-img-top rounded-4" alt="{{ service.name }}"
          style="height: 230px; object-fit: cover;">

        <!-- Card Body -->
        <div class="card-body text-center">

          <h4 class="fw-bold mt-3 mb-2">
            {{ service.name }}
          </h4>

          <p class="text-muted mb-3">
            {{ service.description }}
          </p>

          <h5 class="text-success fw-bold mb-4">
            {{ service.price | currency:'INR' }}
          </h5>

          <a [routerLink]="['/service', service.id]" [queryParams]="{ name: service.name }" class="btn btn-primary">
            View Details
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
